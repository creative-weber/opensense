model:
  base: "meta-llama/Meta-Llama-3-8B-Instruct"   # HuggingFace model ID
  name: "my-custom-model"
  quant: "Q4_K_M"                                 # Q2_K | Q4_K_M | Q5_K_M | Q8_0

training:
  epochs: 3
  batch_size: 4
  learning_rate: 2e-4
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  max_seq_length: 2048
  device_map: "auto"                              # "auto" | "cpu" | "cuda"

paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  base_model: "models/base"
  fine_tuned: "models/fine_tuned"
  gguf_out: "gguf"

api:
  backend: "ollama"                               # "ollama" | "llamacpp"
  ollama_url: "http://localhost:11434"
  llamacpp_url: "http://localhost:8080"
  model_name: "my-custom-model"
  api_key: ""                                     # leave empty to disable auth

memory:
  enabled: true                                   # set false to disable the learning feature entirely
  persist_dir: "memory/db"                        # ChromaDB storage path
  top_k: 5                                        # max facts retrieved per chat request
  min_score: 0.45                                 # minimum cosine similarity to inject a fact (0–1)
  model_check: true                               # run model-assisted authenticity check on new facts
  min_confidence: 0.6                             # minimum confidence score to accept a fact (0–1)

web_search:
  enabled: false                                  # set true to enable Gemini-style web grounding
  provider: "duckduckgo"                          # "duckduckgo" (no key needed) | "brave" | "serpapi"
  api_key: ""                                     # required for brave / serpapi; or set OPENSENSE_SEARCH_KEY env var
  max_results: 5                                  # how many web snippets to inject into the prompt
  mode: "auto"                                    # "auto" (only factual/current queries) | "always" | "never"

nlp:
  enabled: true                                   # master switch — set false to bypass all NLP processing
  spell_check: true                               # correct spelling in user input (requires pyspellchecker)
  style_adapt: true                               # detect user style and inject response-style instruction into prompt
  input_normalize: true                           # expand chat-speak (u→you, gonna→going to, etc.) and fix punctuation
